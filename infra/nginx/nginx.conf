events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;

        # API — strip the /api prefix before forwarding
        location /api/ {
            proxy_pass         http://gis-api:8080/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Frontend SPA — serve static files, fall back to index.html
        location / {
            proxy_pass         http://gis-web:80;
            proxy_set_header   Host $host;

            # SPA fallback handled by the gis-web nginx config
        }
    }
}
