services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gisdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gis-api:
    build:
      context: ../apps/gis-api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-gisdb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-changeme}"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  gis-web:
    build:
      context: ../apps/gis-web
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - gis-api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gis-api
      - gis-web

volumes:
  postgres_data:
