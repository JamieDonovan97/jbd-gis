name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  pages:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      # No-op until the Cloudflare secrets exist, so this never fails a fresh repo.
      - name: Check for Cloudflare credentials
        id: guard
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$ACCOUNT" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not set — skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # nbgv needs full history for git height

      - if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/gis-web/package-lock.json

      # Same version source as the API, so the deployed bundle reports the real build.
      - if: steps.guard.outputs.configured == 'true'
        id: nbgv
        uses: dotnet/nbgv@v0.5.2

      - if: steps.guard.outputs.configured == 'true'
        name: Install & build
        working-directory: apps/gis-web
        env:
          VITE_APP_VERSION: ${{ steps.nbgv.outputs.SemVer2 }}
        run: |
          npm ci
          npm run build

      - if: steps.guard.outputs.configured == 'true'
        name: Deploy to Cloudflare Pages (Direct Upload)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/gis-web
          command: pages deploy dist --project-name=jbd-gis --branch=main
