name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gis-api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  web:
    name: Web — lint, typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gis-web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/gis-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  docker:
    name: Docker — validate compose
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v7

      - name: Validate compose config
        run: docker compose -f infra/docker-compose.yml config --quiet
