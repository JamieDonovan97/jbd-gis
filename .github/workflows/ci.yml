name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gis-api
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # Nerdbank.GitVersioning needs full history for git height

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  web:
    name: Web — format, lint, typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gis-web
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # nbgv needs full history for git height

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/gis-web/package-lock.json

      # Compute the version from the same root version.json the API uses, so
      # the web bundle and the API report the identical build.
      - uses: dotnet/nbgv@v0.5.2
        id: nbgv

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_APP_VERSION: ${{ steps.nbgv.outputs.SemVer2 }}
        run: npm run build

  engine:
    name: Engine — lint, typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gis-engine
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install
        run: uv sync

      - name: Format check
        run: uv run ruff format --check

      - name: Lint
        run: uv run ruff check

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest

  docker:
    name: Docker — compose config & engine image
    runs-on: ubuntu-latest
    needs: [api, web, engine]
    steps:
      - uses: actions/checkout@v7

      - name: Validate compose config
        run: docker compose -f infra/docker-compose.yml config --quiet

      - name: Build gis-engine image
        run: docker build apps/gis-engine
